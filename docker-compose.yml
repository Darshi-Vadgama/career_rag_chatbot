# docker-compose.yml
# RUN FASTAPI + STREAMLIT TOGETHER

version: "3.9"

services:

  backend:
    build: .
    container_name: career_backend

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    restart: always


  frontend:
    build: .
    container_name: career_frontend

    command: >
      streamlit run ui/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0

    ports:
      - "8501:8501"

    env_file:
      - .env

    volumes:
      - .:/app

    depends_on:
      - backend

    restart: always