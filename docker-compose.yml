# docker-compose.yml
# FINAL PERFORMANCE OPTIMIZED VERSION
# Target: 50 requests | 0 failures | 15-25 sec realistic

services:

  backend:
    build: .
    container_name: career_backend

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4

    ports:
      - "8000:8000"

    restart: always

    environment:
      - PYTHONUNBUFFERED=1

    volumes:
      - .:/app

  frontend:
    build: .
    container_name: career_frontend

    command: >
      streamlit run ui/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0

    ports:
      - "8501:8501"

    restart: always

    depends_on:
      - backend

    volumes:
      - .:/app